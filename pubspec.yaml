name: video_journal
description: "A Flutter video journal app using Riverpod and Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_dotenv: ^6.0.1
  dio: ^5.9.2
  connectivity_plus: ^7.1.1
  logger: ^2.7.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
    
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
